name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: the pipeline only needs to read the repository.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # stay in lock-step with the module's Go version
          cache: true

      # Quality gates run shift-left: cheapest checks first so failures surface fast.
      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      # Security gate: the stdlib equivalent of `npm audit`. Reports only
      # vulnerabilities actually reachable from this module's call graph.
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
