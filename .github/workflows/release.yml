name: Release

# Tag-triggered CD: pushing a vX.Y.Z tag cross-compiles the three binaries and
# publishes them as a GitHub Release. Rollback = re-install a previous tag's
# artifacts; nothing is deployed to a live host, so releases are immutable.
on:
  push:
    tags: ['v*']

# Creating a release requires write access to repository contents.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Re-run the quality gates so a tag can never ship code that would fail CI.
      - name: Verify
        run: |
          test -z "$(gofmt -l .)" || { echo "not gofmt-clean"; exit 1; }
          go vet ./...
          go test -race ./...

      - name: Build release artifacts
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            name="filequeue_${version}_${os}_${arch}"
            mkdir -p "build/${name}"
            for cmd in server reader writer; do
              CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" \
                go build -trimpath -ldflags "-s -w" \
                -o "build/${name}/${cmd}" "./cmd/${cmd}"
            done
            tar -czf "dist/${name}.tar.gz" -C build "${name}"
          done
          ( cd dist && sha256sum *.tar.gz > checksums.txt )

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.txt --generate-notes
